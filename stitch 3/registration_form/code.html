<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration - Before we begin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff4400",
                        "background-light": "#f8f6f5",
                        "background-dark": "#23140f",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full">
<!-- Progress Dots -->
<div class="flex justify-center items-center space-x-4 mb-8">
<div class="flex flex-col items-center">
<div class="w-3 h-3 rounded-full bg-primary ring-4 ring-primary/20"></div>
<span class="text-[10px] mt-1 font-medium text-primary uppercase tracking-wider">Form</span>
</div>
<div class="w-12 h-px bg-slate-300 dark:bg-slate-700"></div>
<div class="flex flex-col items-center">
<div class="w-3 h-3 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<span class="text-[10px] mt-1 font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wider">Play</span>
</div>
<div class="w-12 h-px bg-slate-300 dark:bg-slate-700"></div>
<div class="flex flex-col items-center">
<div class="w-3 h-3 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<span class="text-[10px] mt-1 font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wider">Result</span>
</div>
</div>
<!-- Main Card -->
<div class="bg-white dark:bg-slate-900/50 rounded-xl shadow-xl shadow-primary/5 border border-primary/10 p-6 md:p-8">
<header class="mb-8">
<h1 class="text-2xl font-bold flex items-center gap-2">
                    Before we begin... <span class="text-xl">✨</span>
</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Enter details to claim reward &amp; join leaderboard</p>
</header>
<form class="space-y-6">
<!-- Inputs Section -->
<div class="space-y-4">
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Name</label>
<input class="w-full px-4 py-3 rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="Enter your full name" type="text"/>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">WhatsApp Number</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">+91</span>
<input class="w-full pl-14 pr-4 py-3 rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="00000 00000" type="tel"/>
</div>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">School Name</label>
<input class="w-full px-4 py-3 rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="Your school or institution" type="text"/>
</div>
</div>
<!-- Class Toggle -->
<div>
<label class="block text-sm font-medium mb-3 text-slate-700 dark:text-slate-300">Current Class</label>
<div class="grid grid-cols-2 gap-4">
<button class="py-4 px-4 rounded-xl border-2 border-primary bg-primary/5 text-primary font-semibold flex flex-col items-center justify-center transition-all" type="button">
<span>Class 11</span>
</button>
<button class="py-4 px-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-400 font-medium hover:border-primary/30 transition-all" type="button">
<span>Class 12</span>
</button>
</div>
</div>
<!-- Interest Selector -->
<div class="space-y-3">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">I'm interested in...</label>
<!-- Item 1: Selected -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-primary bg-primary/5 cursor-pointer group transition-all">
<div class="flex items-center gap-4">
<span class="text-2xl">🌐</span>
<span class="font-semibold text-slate-900 dark:text-white">Web Development</span>
</div>
<div class="w-6 h-6 rounded-md border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-icons text-white text-sm">check</span>
</div>
<input checked="" class="hidden" type="checkbox"/>
</label>
<!-- Item 2 -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 cursor-pointer group hover:border-primary/20 transition-all">
<div class="flex items-center gap-4">
<span class="text-2xl">📱</span>
<span class="font-medium text-slate-700 dark:text-slate-300">App Development</span>
</div>
<div class="w-6 h-6 rounded-md border-2 border-slate-300 dark:border-slate-600 bg-transparent flex items-center justify-center group-hover:border-primary/50">
</div>
<input class="hidden" type="checkbox"/>
</label>
<!-- Item 3 -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 cursor-pointer group hover:border-primary/20 transition-all">
<div class="flex items-center gap-4">
<span class="text-2xl">🤖</span>
<span class="font-medium text-slate-700 dark:text-slate-300">Artificial Intelligence</span>
</div>
<div class="w-6 h-6 rounded-md border-2 border-slate-300 dark:border-slate-600 bg-transparent flex items-center justify-center group-hover:border-primary/50">
</div>
<input class="hidden" type="checkbox"/>
</label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-[#ff6600] text-white font-bold rounded-xl shadow-lg shadow-primary/25 hover:shadow-primary/40 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 group" type="submit">
                    Let's Play!
                    <span class="material-icons group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Decor -->
<div class="mt-8 flex justify-center opacity-20 grayscale pointer-events-none">
<img alt="Abstract tech background" class="w-24 h-1 object-cover rounded-full" data-alt="Modern abstract minimalist lines and shapes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1_FIC3EqPZt6Fu_tMzh9_cZ0WF5JsXplnctg1mAaIs0qkokpGSDWImkHPiChBhxRi_w4GfwK5-UcxPy3QCmwmQ4xb7_usxv7oQLzAmoxrFLXGEO94kjNKhKYDIqBSUwqn0FQlKQ-K7cEKk7KQF8TeIkuS7-UnzEz38gpymjil2kZl7L-Uo4KfJNvX1a0Do9gcL38D5h41_6hiAS_dkcAoTB4YpOrQcA2S0hR9O87BF9Ek32E_Ff5TqH70AdVois9SG2o7lBS-TIR6"/>
</div>
</div>
</body></html>
