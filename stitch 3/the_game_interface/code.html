<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Space+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff4400",
                        "background-light": "#f8f6f5",
                        "background-dark": "#23140f",
                    },
                    fontFamily: {
                        "display": ["Lexend"],
                        "mono": ["Space Mono"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col p-4">
<!-- Top Navigation / Progress Bar -->
<header class="flex items-center justify-between mb-8">
<div class="flex gap-2">
<!-- Round Indicators -->
<div class="px-3 py-1 rounded-full border-2 border-primary text-primary text-xs font-bold bg-primary/5">
                    R1
                </div>
<div class="px-3 py-1 rounded-full border-2 border-slate-200 dark:border-slate-700 text-slate-400 text-xs font-bold">
                    R2
                </div>
<div class="px-3 py-1 rounded-full border-2 border-slate-200 dark:border-slate-700 text-slate-400 text-xs font-bold">
                    R3
                </div>
</div>
<div class="flex items-center gap-3">
<div class="px-4 py-1.5 rounded-full bg-primary/10 border border-primary text-primary font-bold text-sm">
                    Score: 0
                </div>
</div>
</header>
<!-- Difficulty Badge -->
<div class="flex justify-center mb-6">
<span class="inline-flex items-center px-4 py-1 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 text-xs font-bold tracking-wide uppercase">
<span class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>
                Warm Up
            </span>
</div>
<!-- Timer Circle -->
<div class="flex justify-center mb-8">
<div class="relative flex items-center justify-center">
<svg class="w-16 h-16 transform -rotate-90">
<circle class="text-slate-200 dark:text-slate-800" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="176" stroke-dashoffset="44" stroke-width="4"></circle>
</svg>
<span class="absolute text-lg font-bold text-primary">30s</span>
</div>
</div>
<!-- Equation Card -->
<div class="bg-white dark:bg-slate-900/50 rounded-xl border-4 border-primary/20 p-8 shadow-xl mb-8 relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary/10 via-primary/40 to-primary/10"></div>
<div class="font-mono space-y-4 text-center mb-8">
<div class="text-3xl sm:text-4xl text-slate-800 dark:text-slate-200 flex items-center justify-center gap-2">
                    🍎 + 🍎 = 10
                </div>
<div class="text-3xl sm:text-4xl text-slate-800 dark:text-slate-200 flex items-center justify-center gap-2">
                    🍎 + 🐶 = 12
                </div>
</div>
<div class="text-center">
<p class="text-xl font-bold text-slate-600 dark:text-slate-400 mb-2">What is 🐶?</p>
</div>
</div>
<!-- Answer Grid -->
<div class="grid grid-cols-2 gap-4 mt-auto">
<!-- Choice 1 -->
<button class="aspect-square flex items-center justify-center text-3xl font-bold bg-white dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-700 rounded-xl text-slate-800 dark:text-slate-100 hover:border-primary/50 transition-all active:translate-y-1 active:border-b-0">
                5
            </button>
<!-- Choice 2 (Selected/Active State Example) -->
<button class="aspect-square flex items-center justify-center text-3xl font-bold bg-white dark:bg-slate-800 border-b-4 border-primary rounded-xl text-primary ring-2 ring-primary/20 transition-all">
                7
            </button>
<!-- Choice 3 -->
<button class="aspect-square flex items-center justify-center text-3xl font-bold bg-white dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-700 rounded-xl text-slate-800 dark:text-slate-100 hover:border-primary/50 transition-all active:translate-y-1 active:border-b-0">
                12
            </button>
<!-- Choice 4 -->
<button class="aspect-square flex items-center justify-center text-3xl font-bold bg-white dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-700 rounded-xl text-slate-800 dark:text-slate-100 hover:border-primary/50 transition-all active:translate-y-1 active:border-b-0">
                2
            </button>
</div>
<!-- Subtle Navigation Helper -->
<footer class="mt-8 flex justify-center text-slate-400 text-xs font-medium uppercase tracking-widest">
            Tap the correct answer
        </footer>
</div>
</body></html>
